name: CI/CD — Stellar Live Poll

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Job 1: Smart-contract tests (poll-contract + vote-token)
  # ─────────────────────────────────────────────────────────────────
  contract-tests:
    name: Contract — Rust / Soroban tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
            vote_token/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run poll-contract tests
        working-directory: contract
        run: cargo test --locked

      - name: Run vote-token tests
        working-directory: vote_token
        run: cargo test --locked

      - name: Build poll-contract WASM (release)
        working-directory: contract
        run: cargo build --release --target wasm32-unknown-unknown --locked

      - name: Build vote-token WASM (release)
        working-directory: vote_token
        run: cargo build --release --target wasm32-unknown-unknown --locked

  # ─────────────────────────────────────────────────────────────────
  # Job 2: Frontend lint + unit tests
  # ─────────────────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend — ESLint + Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Run Vitest unit tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────
  # Job 3: Frontend production build + upload artifact
  # ─────────────────────────────────────────────────────────────────
  build:
    name: Frontend — Production build
    runs-on: ubuntu-latest
    needs: [contract-tests, frontend-tests]
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_CONTRACT_ID: ${{ secrets.VITE_CONTRACT_ID }}
      VITE_REWARD_TOKEN_ID: ${{ secrets.VITE_REWARD_TOKEN_ID }}
      VITE_SOROBAN_RPC_URL: ${{ secrets.VITE_SOROBAN_RPC_URL || 'https://soroban-testnet.stellar.org' }}
      VITE_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
